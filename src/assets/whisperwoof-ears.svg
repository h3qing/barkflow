<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Mando's ears — tall pointed shepherd ears, slightly angled outward -->

  <!-- Left ear (tall triangle, angled slightly left) -->
  <path d="M 14 28 C 14 28 10 12 8 6 C 7.5 4.5 8.5 3.5 9.5 4 C 11 5 17 16 18 28 Z" fill="#D97706"/>
  <!-- Left ear inner (lighter, pinkish) -->
  <path d="M 14.5 26 C 14.5 26 11.5 14 10 8 C 9.8 7.2 10.3 6.8 10.8 7.2 C 11.8 8 15.5 17 16.5 26 Z" fill="#F59E0B" opacity="0.5"/>

  <!-- Right ear (tall triangle, angled slightly right) -->
  <path d="M 34 28 C 34 28 38 12 40 6 C 40.5 4.5 39.5 3.5 38.5 4 C 37 5 31 16 30 28 Z" fill="#D97706"/>
  <!-- Right ear inner -->
  <path d="M 33.5 26 C 33.5 26 36.5 14 38 8 C 38.2 7.2 37.7 6.8 37.2 7.2 C 36.2 8 32.5 17 31.5 26 Z" fill="#F59E0B" opacity="0.5"/>

  <!-- Head silhouette (subtle, connects the ears) -->
  <ellipse cx="24" cy="34" rx="12" ry="10" fill="#D97706" opacity="0.15"/>

  <!-- Waveform bars (centered between ears) -->
  <rect x="18" y="30" width="2" rx="1" height="5" fill="white" opacity="0.9"/>
  <rect x="21" y="28" width="2" rx="1" height="9" fill="white" opacity="0.9"/>
  <rect x="24" y="26" width="2" rx="1" height="13" fill="white" opacity="0.9"/>
  <rect x="27" y="28" width="2" rx="1" height="9" fill="white" opacity="0.9"/>
  <rect x="30" y="30" width="2" rx="1" height="5" fill="white" opacity="0.9"/>
</svg>
